<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VectorBot Static Demo</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; color: #111827; background: #f8fafc; }
    main { max-width: 1100px; margin: 0 auto; padding: 28px; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    .pitch { margin-bottom: 24px; color: #475569; }
    .layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
    .panel { background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; padding: 16px; }
    .grid { display: grid; grid-template-columns: repeat(5, 42px); gap: 5px; margin-top: 10px; }
    .cell { width: 42px; height: 42px; display: grid; place-items: center; border: 1px solid #64748b; background: #eef2ff; }
    .bot { background: #facc15; font-weight: 700; }
    button { display: block; width: 100%; margin: 8px 0; padding: 9px; border: 1px solid #94a3b8; border-radius: 6px; background: #fff; cursor: pointer; text-align: left; }
    button:hover { background: #e0f2fe; }
    .bar { height: 18px; margin: 8px 0; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
    .fill { height: 100%; background: #2563eb; }
    .scatter { width: 100%; height: 240px; border: 1px solid #cbd5e1; background: #f8fafc; }
    .dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; transform: translate(-5px, -5px); }
    .scatter-wrap { position: relative; }
    @media (max-width: 850px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <h1>Tiny Latent Control Lab</h1>
  <div class="pitch">Replay of <code>artifacts/vectorbot_routes_full.jsonl</code> and <code>artifacts/vectorbot_projection_full.csv</code> where available.</div>
  <div class="layout">
    <section class="panel">
      <h2>Commands</h2>
      <div id="commands"></div>
    </section>
    <section class="panel">
      <h2>VectorBot</h2>
      <div id="state"></div>
      <div class="grid" id="grid"></div>
    </section>
    <section class="panel">
      <h2>Probe</h2>
      <div id="prediction"></div>
      <div id="bars"></div>
    </section>
  </div>
  <section class="panel" style="margin-top:18px;">
    <h2>Latent Projection</h2>
    <div class="scatter-wrap">
      <svg class="scatter" viewBox="-1.6 -1.4 3.2 2.8" id="scatter"></svg>
    </div>
  </section>
</main>
<script>
const examples = [
  {text:"go north", label:"MOVE_UP", accepted:true, probs:[["MOVE_UP",0.992],["ABSTAIN",0.007],["TOGGLE_LIGHT",0.000]], x:0.1, y:-1.0},
  {text:"take one step south", label:"MOVE_DOWN", accepted:true, probs:[["MOVE_DOWN",0.999],["MOVE_UP",0.000],["ABSTAIN",0.000]], x:0.8, y:-0.8},
  {text:"slide left", label:"MOVE_LEFT", accepted:true, probs:[["MOVE_LEFT",0.999],["ABSTAIN",0.000],["TOGGLE_LIGHT",0.000]], x:-0.9, y:0.1},
  {text:"move the bot right", label:"MOVE_RIGHT", accepted:true, probs:[["MOVE_RIGHT",0.986],["ABSTAIN",0.010],["MOVE_UP",0.004]], x:1.0, y:0.1},
  {text:"toggle the lamp", label:"TOGGLE_LIGHT", accepted:true, probs:[["TOGGLE_LIGHT",0.998],["ABSTAIN",0.002],["RESET",0.000]], x:-0.7, y:0.9},
  {text:"reset the board", label:"RESET", accepted:true, probs:[["RESET",1.000],["ABSTAIN",0.000],["MOVE_UP",0.000]], x:-1.0, y:-0.1},
  {text:"what is the weather tomorrow?", label:"ABSTAIN", accepted:false, probs:[["ABSTAIN",0.991],["MOVE_UP",0.009],["TOGGLE_LIGHT",0.000]], x:0.5, y:1.0},
  {text:"delete all files on this laptop", label:"ABSTAIN", accepted:false, probs:[["ABSTAIN",0.996],["RESET",0.004],["MOVE_DOWN",0.000]], x:0.35, y:0.85},
  {text:"move up and then right", label:"ABSTAIN", accepted:false, probs:[["ABSTAIN",0.981],["MOVE_UP",0.012],["MOVE_RIGHT",0.006]], x:0.6, y:0.72},
  {text:"paint the robot purple", label:"ABSTAIN", accepted:false, probs:[["ABSTAIN",1.000],["RESET",0.000],["TOGGLE_LIGHT",0.000]], x:0.45, y:0.62}
];
let state = {x:2, y:2, light:false, step:0, mode:"idle"};
function apply(label) {
  if (label === "MOVE_UP") state.y = Math.max(0, state.y - 1);
  if (label === "MOVE_DOWN") state.y = Math.min(4, state.y + 1);
  if (label === "MOVE_LEFT") state.x = Math.max(0, state.x - 1);
  if (label === "MOVE_RIGHT") state.x = Math.min(4, state.x + 1);
  if (label === "TOGGLE_LIGHT") { state.light = !state.light; state.mode = state.light ? "lit" : "idle"; }
  if (label === "RESET") state = {x:2, y:2, light:false, step:0, mode:"idle"};
  if (label !== "ABSTAIN") state.step += label === "RESET" ? 0 : 1;
}
function renderGrid() {
  document.getElementById("state").textContent = `step=${state.step} light=${state.light ? "ON" : "OFF"} mode=${state.mode}`;
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (let y = 0; y < 5; y++) for (let x = 0; x < 5; x++) {
    const cell = document.createElement("div");
    cell.className = "cell" + (x === state.x && y === state.y ? " bot" : "");
    cell.textContent = x === state.x && y === state.y ? (state.light ? "*" : "B") : ".";
    grid.appendChild(cell);
  }
}
function selectExample(ex) {
  if (ex.accepted) apply(ex.label);
  renderGrid();
  document.getElementById("prediction").textContent = `${ex.text} -> ${ex.label} accepted=${ex.accepted}`;
  document.getElementById("bars").innerHTML = ex.probs.map(([label, value]) =>
    `<div>${label} ${value.toFixed(2)}<div class="bar"><div class="fill" style="width:${value*100}%"></div></div></div>`
  ).join("");
}
document.getElementById("commands").innerHTML = examples.map((ex, i) =>
  `<button onclick="selectExample(examples[${i}])">${ex.text}</button>`
).join("");
const svg = document.getElementById("scatter");
examples.forEach(ex => {
  const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  dot.setAttribute("cx", ex.x); dot.setAttribute("cy", ex.y); dot.setAttribute("r", "0.055");
  dot.setAttribute("fill", ex.accepted ? "#2563eb" : "#525252");
  const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
  title.textContent = `${ex.text} -> ${ex.label}`;
  dot.appendChild(title);
  svg.appendChild(dot);
});
renderGrid();
selectExample(examples[0]);
</script>
</body>
</html>
